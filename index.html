    // --- SOUND SYNTHESIS USING WEB AUDIO API (NO EXTERNAL ASSETS NEEDED!) ---
    const playSynthSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        const now = ctx.currentTime;
        
        if (type === 'success') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, now); // C5
          osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
          osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
          osc.frequency.setValueAtTime(1046.50, now + 0.3); // C6
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          
          osc.start(now);
          osc.stop(now + 0.5);
        } else if (type === 'error') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, now);
          osc.frequency.linearRampToValueAtTime(110, now + 0.3);
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
          
          osc.start(now);
          osc.stop(now + 0.4);
        } else if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
          
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          
          osc.start(now);
          osc.stop(now + 0.15);
        } else if (type === 'bubble') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.1, now + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          
          osc.start(now);
          osc.stop(now + 0.2);
        } else if (type === 'star') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(987.77, now); // B5
          osc.frequency.setValueAtTime(1318.51, now + 0.08); // E6
          osc.frequency.setValueAtTime(1975.53, now + 0.16); // B6
          
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
          
          osc.start(now);
          osc.stop(now + 0.45);
        }
      } catch (e) {
        console.warn("Audio Context is blocked or not supported by browser", e);
      }
    };

                          voices[0];
          if (enVoice) utterance.voice = enVoice;
        }
        
        window.speechSynthesis.speak(utterance);

    // ==========================================
    // 3.1 GAME 1: MATCHING GAME
    // ==========================================
    function MatchingGame({ addStars }) {
      const [leftItems, setLeftItems] = useState([]);
      const [rightItems, setRightItems] = useState([]);
      const [selectedLeft, setSelectedLeft] = useState(null);
      const [selectedRight, setSelectedRight] = useState(null);
      const [matchedPairs, setMatchedPairs] = useState([]);
      const [completed, setCompleted] = useState(false);

      const itemsPool = [
        { sym: "He", use: "🎈 氣球漂浮" },
        { sym: "Li", use: "🔋 手機電池" },
        { sym: "O",  use: "🌳 呼吸氧氣" },
        { sym: "F",  use: "🦷 保護牙膏" },
        { sym: "Na", use: "🧂 食鹽成份" },
        { sym: "Ca", use: "🥛 骨骼牛奶" },
        { sym: "Si", use: "💻 電腦晶片" },
        { sym: "Al", use: "🥤 易拉罐子" }
      ];

      const initializeGame = () => {
        const shuffled = [...itemsPool].sort(() => 0.5 - Math.random()).slice(0, 4);
        const left = shuffled.map(x => ({ sym: x.sym })).sort(() => 0.5 - Math.random());
        const right = shuffled.map(x => ({ sym: x.sym, use: x.use })).sort(() => 0.5 - Math.random());

        setLeftItems(left);
        setRightItems(right);
        setSelectedLeft(null);
        setSelectedRight(null);
        setMatchedPairs([]);
        setCompleted(false);
      };

      useEffect(() => {
        initializeGame();
      }, []);

      const handleLeftClick = (sym) => {
        if (matchedPairs.includes(sym)) return;
        playSynthSound('click');
        setSelectedLeft(sym);
        checkMatch(sym, selectedRight);
      };

      const handleRightClick = (sym) => {
        if (matchedPairs.includes(sym)) return;
        playSynthSound('click');
        setSelectedRight(sym);
        checkMatch(selectedLeft, sym);
      };

      const checkMatch = (leftSym, rightSym) => {
        if (leftSym && rightSym) {
          if (leftSym === rightSym) {
            playSynthSound('success');
            setMatchedPairs(prev => {
              const updated = [...prev, leftSym];
              if (updated.length === 4) {
                setCompleted(true);
                addStars(10); 
              }
              return updated;
            });
          } else {
            playSynthSound('error');
          }
          setSelectedLeft(null);
          setSelectedRight(null);
        }
      };

      return (
        <div class="bg-white rounded-3xl p-6 border-4 border-pink-300 shadow-xl max-w-2xl mx-auto space-y-6">

            {/* Left Column (Symbols) */}
            <div class="space-y-4">
              <h4 class="text-center font-bold text-slate-400 text-xs">化學符號</h4>
              {leftItems.map((item) => {
                const isMatched = matchedPairs.includes(item.sym);
                const isSelected = selectedLeft === item.sym;
                return (
                  <button
                    key={item.sym}
                    onClick={() => handleLeftClick(item.sym)}
                    disabled={isMatched}
                    class={`w-full py-4 rounded-2xl font-extrabold text-2xl border-4 transition flex items-center justify-center ${
                      isMatched 
                        ? 'bg-emerald-100 border-emerald-300 text-emerald-500 opacity-60' 
                        : isSelected
                          ? 'bg-pink-100 border-pink-500 text-pink-600 scale-105 shadow-md'
                          : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'

                      isMatched 
                        ? 'bg-emerald-100 border-emerald-300 text-emerald-500 opacity-60'

                          : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'

          {/* Success Banner */}
          {completed && (
            <div class="bg-gradient-to-r from-emerald-400 to-teal-500 text-white rounded-2xl p-5 text-center animate-bounce shadow-lg space-y-3">
              <h4 class="text-xl font-black">🎉 太棒了！全部連線正確！</h4>
              <p class="text-sm">你獲得了 🌟 10 顆星星獎勵！日常生活的化學難不倒你！</p>

    // ==========================================
    // 3.2 GAME 2: QUIZ GAME
    // ==========================================
    function QuizGame({ addStars }) {
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [quizCompleted, setQuizCompleted] = useState(false);

      const quizPool = [
        { q: "牛奶中有大量哪種元素，能幫助我們的骨骼和牙齒生長得更強壯？", options: ["H (氫)", "He (氦)", "Ca (鈣)", "Li (鋰)"], correct: 2, hint: "Calcium 鈣質是骨骼發展的大功臣！" },
        { q: "「鬼口水拉伸泥」中，是加入了哪一種化學元素才能軟綿綿拉開呢？", options: ["B (硼)", "C (碳)", "O (氧)", "Na (鈉)"], correct: 0, hint: "Boron 硼砂能改變鬼口水的結構。" },
        { q: "我們在薯片袋中，充入甚麼安全氣體可以使薯片長時間爽脆？", options: ["Cl (氯)", "N (氮)", "H (氫)", "F (氟)"], correct: 1, hint: "Nitrogen 氮氣佔了空氣的78%！" },
        { q: "街上五顏六色非常美麗耀眼的「霓虹燈招牌」，裡面充入了甚麼氣體？", options: ["Ar (氬)", "Mg (鎂)", "Si (矽)", "Ne (氖)"], correct: 3, hint: "Neon 氖通電時會發出絢麗紅光。" },
        { q: "保護牙齒避免產生蛀牙，我們應該使用含有哪種元素的防蛀牙膏？", options: ["F (氟)", "C (碳)", "Be (鈹)", "S (硫)"], correct: 0, hint: "Fluorine 氟是牙齒表面結合成保護盾。" },
        { q: "香蕉中富含哪種重要的電解質，能保證我們的肌肉神經健康運動？", options: ["Na (鈉)", "K (鉀)", "Li (鋰)", "Al (鋁)"], correct: 1, hint: "Potassium 鉀在香蕉 and 牛油果中最多。" },
        { q: "燃燒時發出耀眼奪目白光，常用於煙花和閃光彈的是哪種元素？", options: ["Mg (鎂)", "He (氦)", "H (氫)", "Si (矽)"], correct: 0, hint: "Magnesium 燃燒白光非常閃耀。" }
      ];

      const startQuiz = () => {
        const shuffled = [...quizPool].sort(() => 0.5 - Math.random()).slice(0, 5);
        setQuestions(shuffled);
        setCurrentIndex(0);
        setSelectedAnswer(null);
        setIsAnswered(false);
        setScore(0);
        setQuizCompleted(false);
      };

      useEffect(() => {
        startQuiz();
      }, []);

      const handleOptionClick = (idx) => {
        if (isAnswered) return;
        setSelectedAnswer(idx);
        setIsAnswered(true);

        const currentQuestion = questions[currentIndex];
        if (idx === currentQuestion.correct) {
          playSynthSound('success');
          setScore(prev => prev + 1);
        } else {
          playSynthSound('error');
        }
      };

      const handleNext = () => {
        playSynthSound('click');
        if (currentIndex < 4) {
          setCurrentIndex(prev => prev + 1);
          setSelectedAnswer(null);
          setIsAnswered(false);
        } else {
          setQuizCompleted(true);
          addStars(score * 3);
        }
      };

      if (questions.length === 0) return null;

      const currentQ = questions[currentIndex];

      return (
        <div class="bg-white rounded-3xl p-6 border-4 border-yellow-300 shadow-xl max-w-xl mx-auto space-y-6">
          {!quizCompleted ? (
            <div class="space-y-4">
              <div class="flex justify-between items-center text-xs text-slate-400 font-bold">
                <span>問答進行中...</span>
                <span>問題 {currentIndex + 1} / 5</span>
              </div>
              <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden border">
                <div class="bg-yellow-400 h-full transition-all duration-300" style={{ width: `${(currentIndex + 1) * 20}%` }}></div>
              </div>

              <div class="bg-yellow-50/50 rounded-2xl p-4 border border-yellow-100">
                <p class="text-lg font-black text-slate-800 leading-relaxed">{currentQ.q}</p>
              </div>

              <div class="space-y-3">
                {currentQ.options.map((opt, idx) => {
                  let btnStyle = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100";
                  
                  if (isAnswered) {
                    if (idx === currentQ.correct) {
                      btnStyle = "bg-emerald-100 border-emerald-500 text-emerald-800 font-black";
                    } else if (idx === selectedAnswer) {
                      btnStyle = "bg-rose-100 border-rose-400 text-rose-800";
                    } else {
                      btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                    }
                  }

                  return (
                    <button
                      key={idx}
                      onClick={() => handleOptionClick(idx)}
                      disabled={isAnswered}
                      class={`w-full py-3 px-4 rounded-xl border-2 text-left text-sm font-bold transition flex justify-between items-center ${btnStyle}`}
                    >
                      <span>{opt}</span>
                      {isAnswered && idx === currentQ.correct && <i class="fa-solid fa-circle-check text-emerald-600"></i>}
                      {isAnswered && idx === selectedAnswer && idx !== currentQ.correct && <i class="fa-solid fa-circle-xmark text-rose-600"></i>}
                    </button>
                  );
                })}
              </div>

              {isAnswered && (
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700 flex items-start gap-2 animate-pulse-slow">
                  <span>💡</span>
                  <div>
                    <span class="font-bold">科學解答小貼士：</span>
                    <span>{currentQ.hint}</span>
                  </div>
                </div>
              )}

              {isAnswered && (
                <button 
                  onClick={handleNext}
                  class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-3 rounded-2xl shadow transition"
                >
                  {currentIndex < 4 ? '下一題 ➡️' : '查看最終得分 🏁'}
                </button>
              )}

            </div>
          ) : (
            <div class="text-center space-y-6 py-4">
              <div class="text-6xl animate-bounce">🎖️</div>
              <h4 class="text-2xl font-black text-slate-800">完成化學問答！</h4>
              <div class="bg-yellow-50 rounded-2xl p-6 border-2 border-yellow-200 max-w-sm mx-auto space-y-2">
                <p class="text-slate-500 text-sm font-bold">答對題數：</p>
                <p class="text-4xl font-extrabold text-yellow-600">{score} / 5</p>
                <p class="text-slate-500 text-xs font-bold pt-2 border-t border-yellow-100">
                  答對每題賺取 3 顆星星！你共獲得：
                </p>
                <p class="text-2xl font-black text-emerald-600">🌟 {score * 3} 顆金星星！</p>
              </div>

              <div class="flex gap-4 max-w-sm mx-auto">
                <button 
                  onClick={startQuiz}
                  class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-slate-800 font-extrabold py-3 rounded-2xl shadow transition"
                >
                  再挑戰一次 🔄
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 3.3 GAME 3: PUZZLE GAME (GRID ARRANGEMENT)
    // ==========================================
    function PuzzleGame({ addStars }) {
      const [gridElements, setGridElements] = useState([]);
      const [missingSlots, setMissingSlots] = useState([]);
      const [draggedItem, setDraggedItem] = useState(null);
      const [solved, setSolved] = useState(false);

      const puzzleBase = [
        { num: 1, sym: "H" },
        { num: 2, sym: "He" },
        { num: 3, sym: "Li" },
        { num: 4, sym: "Be" },
        { num: 5, sym: "B" },
        { num: 6, sym: "C" },
        { num: 7, sym: "N" },
        { num: 8, sym: "O" }
      ];

      const initPuzzle = () => {
        const missingCount = 3;
        const shuffled = [...puzzleBase].sort(() => 0.5 - Math.random());
        const missingNums = shuffled.slice(0, missingCount).map(x => x.num);
        
        setMissingSlots(shuffled.slice(0, missingCount));
        setGridElements(puzzleBase.map(el => ({
          ...el,
          isMissing: missingNums.includes(el.num),
          currentSym: missingNums.includes(el.num) ? "" : el.sym
        })));
        setDraggedItem(null);
        setSolved(false);
      };

      useEffect(() => {
        initPuzzle();
      }, []);

      const handleSlotClick = (num) => {
        if (!draggedItem) return;
        
        playSynthSound('click');
        const targetEl = gridElements.find(g => g.num === num);

        if (targetEl.num === draggedItem.num) {
          playSynthSound('success');
          setGridElements(prev => prev.map(g => {
            if (g.num === num) {
              return { ...g, currentSym: draggedItem.sym, isMissing: false };
            }
            return g;
          }));
          
          setMissingSlots(prev => {
            const updated = prev.filter(x => x.num !== draggedItem.num);
            if (updated.length === 0) {
              setSolved(true);
              addStars(15); 
            }
            return updated;
          });
          setDraggedItem(null);
        } else {
          playSynthSound('error');
        }
      };

      return (
        <div class="bg-white rounded-3xl p-6 border-4 border-blue-300 shadow-xl max-w-xl mx-auto space-y-6">
          <div class="text-center">
            <h3 class="text-2xl font-black text-blue-600 flex items-center justify-center gap-2">
              <span>🧩 元素拼圖挑戰：修復前8位週期表</span>
            </h3>
            <p class="text-slate-500 text-sm mt-1">
              先在底下點選被吹跑的元素卡，再點擊週期表中閃爍對應序號「？」的空白家裡吧！
            </p>
          </div>

          {/* Mini-Periodic Grid (Layout) */}
          <div class="border-4 border-dashed border-slate-200 rounded-3xl p-4 bg-slate-50/50 space-y-4">
            {/* Period 1 (H on left, He on far right) */}
            <div class="flex justify-between items-center gap-4">
              {gridElements.filter(g => g.num <= 2).map((item) => (
                <div 
                  key={item.num}
                  onClick={() => item.isMissing && handleSlotClick(item.num)}
                  class={`w-20 h-20 rounded-2xl border-4 font-black flex flex-col items-center justify-center transition cursor-pointer ${
                    item.isMissing 
                      ? 'bg-blue-100 border-blue-400 text-blue-500 hover:scale-105 shadow-inner border-dashed animate-pulse'
                      : 'bg-emerald-400 border-emerald-600 text-white shadow'
                  }`}
                >
                  <span class="text-[10px] block opacity-85">No.{item.num}</span>
                  <span class="text-xl">{item.isMissing ? '?' : item.sym}</span>
                </div>
              ))}
            </div>

            {/* Period 2 (Li, Be, B, C, N, O in grid) */}
            <div class="grid grid-cols-6 gap-2">
              {gridElements.filter(g => g.num >= 3 && g.num <= 8).map((item) => (
                <div 
                  key={item.num}
                  onClick={() => item.isMissing && handleSlotClick(item.num)}
                  class={`h-20 rounded-xl border-4 font-black flex flex-col items-center justify-center transition cursor-pointer ${
                    item.isMissing 
                      ? 'bg-blue-100 border-blue-400 text-blue-500 hover:scale-105 shadow-inner border-dashed animate-pulse'
                      : 'bg-emerald-400 border-emerald-600 text-white shadow'
                  }`}
                >
                  <span class="text-[9px] block opacity-85">No.{item.num}</span>
                  <span class="text-lg">{item.isMissing ? '?' : item.sym}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Missing elements drawer */}
          {!solved && (
            <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100 space-y-3">
              <h4 class="text-xs font-bold text-slate-500 text-center">🌬️ 被狂風刮走掉落的化學元素：</h4>
              <div class="flex justify-center gap-4">
                {missingSlots.map((item) => {
                  const isSelected = draggedItem?.num === item.num;
                  return (
                    <button
                      key={item.num}
                      onClick={() => { playSynthSound('click'); setDraggedItem(item); }}
                      class={`w-16 h-16 rounded-xl border-4 font-extrabold text-lg shadow-md flex flex-col items-center justify-center transition ${
                        isSelected 
                          ? 'bg-yellow-400 border-yellow-600 text-slate-800 scale-110 shadow-lg' 
                          : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-100'
                      }`}
                    >
                      <span class="text-[9px] block opacity-70">No.{item.num}</span>
                      <span>{item.sym}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Success Reward Banner */}
          {solved && (
            <div class="bg-gradient-to-r from-emerald-400 to-teal-500 text-white rounded-2xl p-5 text-center animate-bounce shadow-lg space-y-3">
              <h4 class="text-xl font-black">🎉 週期表修復大成功！</h4>
              <p class="text-sm">太厲害了，所有元素都順利送回正確原子序位置了！你獲得了 🌟 15 顆星星獎勵！</p>
              <button 
                onClick={initPuzzle}
                class="bg-white text-emerald-600 font-extrabold py-2 px-6 rounded-full shadow hover:bg-slate-50 transition"
              >
                繼續拼圖 🔄
              </button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. DOWNLOAD & PRINT SECTION (TAB 5 - CORRECT 118-ELEMENT LAYOUT)
    // ==========================================
    function DownloadSection() {
      const handlePrint = () => {
        playSynthSound('success');
        window.print();
      };

      const getCategoryBorderColor = (cat) => {
        switch (cat) {
          case 'reactive-nonmetal': return 'border-pink-300 bg-pink-50/50';
          case 'noble-gas': return 'border-purple-300 bg-purple-50/50';
          case 'alkali-metal': return 'border-amber-300 bg-amber-50/50';
          case 'alkaline-earth': return 'border-emerald-300 bg-emerald-50/50';
          case 'metalloid': return 'border-yellow-300 bg-yellow-50/50';
          case 'halogen': return 'border-sky-300 bg-sky-50/50';
          case 'post-transition': return 'border-cyan-300 bg-cyan-50/50';
          case 'transition-metal': return 'border-red-300 bg-red-50/50';
          case 'lanthanide': return 'border-indigo-300 bg-indigo-50/50';
          case 'actinide': return 'border-violet-300 bg-violet-50/50';
          default: return 'border-slate-300 bg-slate-50/50';
        }
      };

      // Construct a standard 18-column grid containing all 118 elements
      // Row 0 to 6 are Period 1 to 7. 
      // Rows 8 and 9 are Separated Lanthanides (58-71) and Actinides (90-103)
      const buildPeriodicGrid = () => {
        const gridArray = Array(18 * 10).fill(null); // 10 rows total, 18 columns each
        
        all118Elements.forEach(el => {
          let row = -1;
          let col = -1;

          // Standard Periodic Rows coordinates
          if (el.num === 1) { row = 0; col = 0; }
          else if (el.num === 2) { row = 0; col = 17; }
          else if (el.num >= 3 && el.num <= 4) { row = 1; col = el.num - 3; }
          else if (el.num >= 5 && el.num <= 10) { row = 1; col = el.num + 7; }
          else if (el.num >= 11 && el.num <= 12) { row = 2; col = el.num - 11; }
          else if (el.num >= 13 && el.num <= 18) { row = 2; col = el.num - 1; }
          else if (el.num >= 19 && el.num <= 36) { row = 3; col = el.num - 19; }
          else if (el.num >= 37 && el.num <= 54) { row = 4; col = el.num - 37; }
          // Period 6: Lanthanide row contains 57 (La) in group, and Ce(58) to Lu(71) at the bottom
          else if (el.num === 55) { row = 5; col = 0; }
          else if (el.num === 56) { row = 5; col = 1; }
          else if (el.num === 57) { row = 5; col = 2; } // Lanthanum placeholder/representative
          else if (el.num >= 58 && el.num <= 71) { 
            // Placed at bottom lanthanide strip (Row 8)
            row = 8; col = el.num - 55; // aligned from col 3 to col 16
          }
          else if (el.num >= 72 && el.num <= 86) { row = 5; col = el.num - 69; }
          // Period 7: Actinide row contains 89 (Ac) in group, and Th(90) to Lr(103) at the bottom
          else if (el.num === 87) { row = 6; col = 0; }
          else if (el.num === 88) { row = 6; col = 1; }
          else if (el.num === 89) { row = 6; col = 2; } // Actinium placeholder/representative
          else if (el.num >= 90 && el.num <= 103) {
            // Placed at bottom actinide strip (Row 9)
            row = 9; col = el.num - 87; // aligned from col 3 to col 16
          }
          else if (el.num >= 104 && el.num <= 118) { row = 6; col = el.num - 101; }

          if (row !== -1 && col !== -1) {
            gridArray[row * 18 + col] = el;
          }
        });
        
        return gridArray;
      };

      const finalGrid = buildPeriodicGrid();

      return (
        <div class="space-y-6">
          {/* Header Controls (Hidden during actual print) */}
          <div class="no-print bg-white rounded-3xl p-6 shadow-md border-4 border-cyan-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="space-y-1 text-center md:text-left">
              <h3 class="text-2xl font-black text-cyan-600 flex items-center justify-center md:justify-start gap-2">
                <i class="fa-solid fa-file-pdf"></i>
                <span>標準 118 號元素週期表（A4 橫向列印版）</span>
              </h3>
              <p class="text-slate-500 text-sm">
                此處顯示的是完整的元素週期表。點擊右側按鈕，系統會自動在橫向 A4 紙張上完整排版，您可以列印實體紙張或存為高清 PDF 學習單！
              </p>
            </div>
            <button 
              onClick={handlePrint}
              class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white font-black py-3.5 px-8 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95 flex items-center gap-2"
            >
              <i class="fa-solid fa-print text-xl"></i>
              <span>列印 / 另存高清 A4 PDF</span>
            </button>
          </div>

          {/* Printable Element Grid Paper Container (Beautifully styled for complete table) */}
          <div class="print-area bg-white rounded-3xl border-4 border-slate-200 p-6 shadow-xl max-w-[1050px] mx-auto space-y-4">
            
            {/* Header Title inside document */}
            <div class="text-center border-b-2 border-slate-100 pb-2 flex justify-between items-center px-2">
              <div class="text-left">
                <h2 class="text-2xl font-black text-slate-800 tracking-wide">
                  🧪 STEAM 元素歷險記 — 化學元素週期表
                </h2>
                <p class="text-slate-400 text-xs font-bold mt-0.5">完整的 118 個化學元素佈局（IUPAC 標準 / A4 橫向）</p>
              </div>
              <div class="text-right text-[10px] text-slate-400 font-bold max-w-[200px] leading-tight no-print">
                小學 STEAM 專用教材 ‧ 支援實體課堂列印與彩繪著色
              </div>
            </div>

            {/* Scientific Periodic Layout Grid (18 columns layout for row alignments) */}
            <div class="overflow-x-auto pb-2">
              <div class="min-w-[980px] grid grid-cols-18 gap-[3px]" style={{ gridTemplateColumns: 'repeat(18, minmax(0, 1fr))' }}>
                {finalGrid.map((el, index) => {
                  const row = Math.floor(index / 18);
                  
                  // Render separator spacer row between actinides and main table
                  if (row === 7) {
                    return <div key={`spacer-${index}`} class="h-2"></div>;
                  }

                  if (el === null) {
                    // Specific annotations in empty regions to make it look highly professional and authentic!
                    if (index === 18 * 2 + 5) {
                      return (
                        <div key={`empty-${index}`} class="col-span-6 row-span-1 flex items-center justify-center text-center opacity-40 select-none no-print">
                          <span class="text-xs font-bold text-slate-300 tracking-widest uppercase">Periodic Table</span>
                        </div>
                      );
                    }
                    // Skip render for cells spanned by the label
                    if (index > 18 * 2 + 5 && index <= 18 * 2 + 10) return null;

                    return <div key={`empty-${index}`} class="rounded bg-slate-50/20 h-[52px]"></div>;
                  }
                  
                  return (
                    <div 
                      key={el.num} 
                      class={`p-1 rounded border-[1.5px] flex flex-col justify-between h-[52px] transition hover:shadow ${getCategoryBorderColor(el.cat)}`}
                    >
                      {/* Top element info */}
                      <div class="flex justify-between items-start leading-none text-[8px]">
                        <span class="text-slate-400 font-black">#{el.num}</span>
                      </div>

                      {/* Chemical symbol display */}
                      <div class="text-center">
                        <h4 class="text-base font-black text-slate-800 leading-none">{el.sym}</h4>
                      </div>

                      {/* Bilingual Names */}
                      <div class="text-center leading-none">
                        <p class="text-[9px] font-black text-slate-700 truncate">{el.nameZh}</p>
                        <p class="text-[7px] font-bold text-slate-400 truncate mt-0.5">{el.nameEn}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Colorful Legends Group */}
            <div class="grid grid-cols-5 md:grid-cols-10 gap-1.5 pt-3 border-t border-slate-100 text-center">
              {Object.keys(categoryNames).map((key) => {
                const cat = categoryNames[key];
                return (
                  <div key={key} class={`p-1 rounded text-[9px] font-black border ${cat.color} truncate shadow-sm`}>
                    {cat.name}
                  </div>
                );
              })}
            </div>

            {/* Student metadata slot for physical worksheets */}
            <div class="pt-3 border-t border-dashed border-slate-200 flex justify-between text-[11px] text-slate-400 font-bold px-2">
              <span>姓名 (Name): ______________________</span>
              <span>班別 (Class): ______________________</span>
              <span>STEAM 課堂專屬學習單</span>
            </div>

          </div>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
